packages:
  - packages/*

linkWorkspacePackages: true

minimumReleaseAge: 2880
# Exclude bigint-buffer2 from minimum release age to use v1.1.0 immediately
# v1.1.0 removes the async init requirement, making native loading synchronous.
# TODO: Remove this exclusion once v1.1.0 is older than 48 hours.
minimumReleaseAgeExclude:
  - "@vekexasia/bigint-buffer2"

nodeLinker: isolated

catalog:
  vitest: "^4.0.7"
  "@vitest/browser": "^4.0.7"
  "@vitest/browser-playwright": "^4.0.7"
  "@vitest/coverage-v8": "^4.0.7"

overrides:
  dns-over-http-resolver": "^2.1.1"
  loupe": "^2.3.6"
  nan": "^2.19.0"
  elliptic: ">=6.6.1"

onlyBuiltDependencies:
  - "@parcel/watcher"
  - "@swc/core"
  - aws-sdk
  - "@vekexasia/bigint-buffer2"
  - classic-level
  - core-js
  - cpu-features
  - electron
  - esbuild
  - nx
  - ssh2
